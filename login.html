<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>JOBHUB — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0a1628;
      --navy-mid: #112240;
      --navy-light: #1a3a6b;
      --accent: #2563eb;
      --accent-glow: #3b82f6;
      --white: #ffffff;
      --off-white: #f4f6fb;
      --muted: #8fa3c1;
      --border: rgba(255,255,255,0.12);
    }

    html, body {
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      background: var(--navy);
      overflow: hidden;
    }

    /* ── LAYOUT ── */
    .page {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* ── LEFT PANEL ── */
    .left {
      flex: 1;
      background: var(--white);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }

    /* Floating binary canvas */
    #binaryCanvas {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .brand {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .brand-logo {
      font-family: 'Space Mono', monospace;
      font-size: 52px;
      font-weight: 700;
      color: var(--navy);
      letter-spacing: -2px;
      line-height: 1;
    }

    .brand-logo span {
      color: var(--accent);
    }

    .brand-tagline {
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 300;
      color: var(--navy-light);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-top: 10px;
    }

    .left-badge {
      position: relative;
      z-index: 2;
      display: flex;
      gap: 18px;
    }

    .stat-chip {
      background: var(--off-white);
      border: 1px solid rgba(10,22,40,0.08);
      border-radius: 32px;
      padding: 8px 18px;
      font-size: 12px;
      font-weight: 500;
      color: var(--navy);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .stat-chip .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(1.4); }
    }

    /* Diagonal divider */
    .divider {
      position: absolute;
      right: -40px;
      top: 0;
      width: 80px;
      height: 100%;
      background: var(--navy-mid);
      clip-path: polygon(40px 0, 100% 0, 60px 100%, 0 100%);
      z-index: 10;
    }

    /* ── RIGHT PANEL ── */
    .right {
      width: 480px;
      flex-shrink: 0;
      background: var(--navy-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 48px;
      position: relative;
      z-index: 5;
    }

    /* subtle grid texture */
    .right::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
    }

    /* corner decoration */
    .right::after {
      content: '';
      position: absolute;
      top: 0; right: 0;
      width: 160px;
      height: 160px;
      background: radial-gradient(circle at top right, rgba(37,99,235,0.25), transparent 70%);
      pointer-events: none;
    }

    /* ── FORM CARD ── */
    .form-card {
      width: 100%;
      max-width: 360px;
      position: relative;
      z-index: 2;
      animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
      opacity: 0;
      transform: translateY(24px);
    }

    @keyframes slideUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .form-header {
      margin-bottom: 36px;
    }

    .form-eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 400;
      color: var(--accent-glow);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .form-title {
      font-family: 'DM Sans', sans-serif;
      font-size: 30px;
      font-weight: 600;
      color: var(--white);
      line-height: 1.15;
    }

    .form-subtitle {
      margin-top: 8px;
      font-size: 13.5px;
      font-weight: 300;
      color: var(--muted);
      line-height: 1.55;
    }

    /* ── TABS ── */
    .tab-row {
      display: flex;
      gap: 0;
      background: rgba(255,255,255,0.06);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 28px;
    }

    .tab-btn {
      flex: 1;
      padding: 10px 0;
      border: none;
      background: transparent;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13.5px;
      font-weight: 500;
      border-radius: 9px;
      cursor: pointer;
      transition: all 0.25s;
    }

    .tab-btn.active {
      background: var(--accent);
      color: var(--white);
      box-shadow: 0 4px 16px rgba(37,99,235,0.4);
    }

    /* ── INPUTS ── */
    .field {
      margin-bottom: 16px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.5px;
      margin-bottom: 7px;
      text-transform: uppercase;
    }

    .input-wrap {
      position: relative;
    }

    .input-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 16px;
      height: 16px;
      color: var(--muted);
      pointer-events: none;
      transition: color 0.2s;
    }

    .field input {
      width: 100%;
      padding: 13px 14px 13px 42px;
      background: var(--white);
      border: 2px solid transparent;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 400;
      color: var(--navy);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input::placeholder { color: #adb8cb; }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(37,99,235,0.18);
    }

    .field input:focus + svg,
    .input-wrap:focus-within svg { color: var(--accent); }

    /* flip icon and input order for SVG-after pattern */
    .input-wrap input { order: 1; }
    .input-wrap svg { order: 0; }

    /* Forgot link */
    .forgot-row {
      display: flex;
      justify-content: flex-end;
      margin-top: -8px;
      margin-bottom: 16px;
    }

    .forgot-link {
      font-size: 12px;
      color: var(--accent-glow);
      text-decoration: none;
      transition: color 0.2s;
    }

    .forgot-link:hover { color: var(--white); }

    /* ── CTA BUTTON ── */
    .cta-btn {
      width: 100%;
      padding: 14px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.3px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      margin-top: 4px;
    }

    .cta-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      opacity: 0;
      transition: opacity 0.2s;
    }

    .cta-btn:hover {
      background: var(--accent-glow);
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(37,99,235,0.45);
    }

    .cta-btn:hover::after { opacity: 1; }
    .cta-btn:active { transform: translateY(0); }

    /* ── DIVIDER LINE ── */
    .or-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 20px 0;
    }

    .or-row hr {
      flex: 1;
      border: none;
      border-top: 1px solid var(--border);
    }

    .or-row span {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1px;
      white-space: nowrap;
    }

    /* ── SOCIAL LOGIN ── */
    .social-row {
      display: flex;
      gap: 10px;
    }

    .social-btn {
      flex: 1;
      padding: 11px 0;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      border-radius: 9px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: background 0.2s, border-color 0.2s, color 0.2s;
    }

    .social-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.25);
      color: var(--white);
    }

    .social-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

    /* ── FOOTER LINK ── */
    .create-account {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--muted);
    }

    .create-account a {
      color: var(--accent-glow);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }

    .create-account a:hover { color: var(--white); }

    /* ── PANEL SWITCH (hidden signup form) ── */
    .panel { display: none; }
    .panel.active { display: block; }

    /* ── RESPONSIVE ── */
    @media (max-width: 860px) {
      .left { display: none; }
      .right { width: 100vw; padding: 32px 28px; }
      .divider { display: none; }
    }
  </style>
</head>
<body>

<div class="page">

  <!-- ══ LEFT PANEL ══ -->
  <div class="left">
    <canvas id="binaryCanvas"></canvas>

    <div class="brand">
      <div class="brand-logo">JOB<span>HUB</span></div>
      <div class="brand-tagline">Connecting Talent &amp; Opportunity</div>
    </div>

    <div class="left-badge">
      <div class="stat-chip"><span class="dot"></span>12,400+ Live Jobs</div>
      <div class="stat-chip"><span class="dot"></span>3,200+ Companies</div>
    </div>

    <div class="divider"></div>
  </div>

  <!-- ══ RIGHT PANEL ══ -->
  <div class="right">
    <div class="form-card">

      <div class="form-header">

        <div class="form-title">Welcome back.</div>
        <div class="form-subtitle">Sign in to discover thousands of opportunities waiting for you.</div>
      </div>

      <!-- TABS -->
      <div class="tab-row">
        <button class="tab-btn active" onclick="switchTab('login', this)">Sign In</button>
        <button class="tab-btn" onclick="switchTab('signup', this)">Create Account</button>
      </div>

      <!-- LOGIN PANEL -->
      <div id="panel-login" class="panel active">

        <div class="field">
          <label>Email Address</label>
          <div class="input-wrap">
            <input type="email" placeholder="you@example.com" autocomplete="email"/>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
          </div>
        </div>

        <div class="field">
          <label>Password</label>
          <div class="input-wrap">
            <input type="password" placeholder="••••••••" autocomplete="current-password"/>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
          </div>
        </div>

        <div class="forgot-row">
          <a href="#" class="forgot-link">Forgot password?</a>
        </div>

        <button class="cta-btn">Sign In &nbsp;→</button>

        <div class="or-row">
          <hr/><span>OR CONTINUE WITH</span><hr/>
        </div>

        <div class="social-row">
          <button class="social-btn">
            <!-- Google icon -->
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.1c-.22-.66-.35-1.36-.35-2.1s.13-1.44.35-2.1V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.61z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
            Google
          </button>
          <button class="social-btn">
            <!-- LinkedIn icon -->
            <svg viewBox="0 0 24 24" fill="#0A66C2"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
            LinkedIn
          </button>
        </div>

        <div class="create-account">
          Don't have an account? <a href="#" onclick="switchTabByName('signup')">Create it here</a>
        </div>

      </div><!-- /panel-login -->

      <!-- SIGNUP PANEL -->
      <div id="panel-signup" class="panel">

        <div class="field">
          <label>Full Name</label>
          <div class="input-wrap">
            <input type="text" placeholder="Your full name" autocomplete="name"/>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
            </svg>
          </div>
        </div>

        <div class="field">
          <label>Email Address</label>
          <div class="input-wrap">
            <input type="email" placeholder="you@example.com" autocomplete="email"/>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>
            </svg>
          </div>
        </div>

        <div class="field">
          <label>Password</label>
          <div class="input-wrap">
            <input type="password" placeholder="Create a strong password" autocomplete="new-password"/>
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
            </svg>
          </div>
        </div>

        <button class="cta-btn" style="margin-top: 8px;">Create Account &nbsp;→</button>

        <div class="create-account" style="margin-top: 20px;">
          Already have an account? <a href="#" onclick="switchTabByName('login')">Sign in</a>
        </div>

      </div><!-- /panel-signup -->

    </div>
  </div>

</div>

<script>
  /* ─── TAB SWITCHING ─── */
  function switchTab(name, btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
  }

  function switchTabByName(name) {
    const btns = document.querySelectorAll('.tab-btn');
    const idx = name === 'login' ? 0 : 1;
    switchTab(name, btns[idx]);
  }

  /* ─── FLOATING BINARY CANVAS ─── */
  const canvas = document.getElementById('binaryCanvas');
  const ctx = canvas.getContext('2d');

  function resize() {
    canvas.width  = canvas.offsetWidth;
    canvas.height = canvas.offsetHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const BITS = [];
  const COUNT = 55;

  function randomBit() {
    return {
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      char: Math.random() > 0.5 ? '1' : '0',
      size: 11 + Math.random() * 18,
      opacity: 0.04 + Math.random() * 0.13,
      speedY: -0.18 - Math.random() * 0.32,
      speedX: (Math.random() - 0.5) * 0.18,
      drift: (Math.random() - 0.5) * 0.004,
      life: 0,
      maxLife: 220 + Math.random() * 280,
    };
  }

  for (let i = 0; i < COUNT; i++) {
    const b = randomBit();
    b.life = Math.random() * b.maxLife; // stagger initial positions
    BITS.push(b);
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    for (const b of BITS) {
      b.life++;
      b.x += b.speedX + Math.sin(b.life * b.drift) * 0.3;
      b.y += b.speedY;

      // fade in / fade out
      let alpha = b.opacity;
      const fadeLen = 40;
      if (b.life < fadeLen) alpha *= b.life / fadeLen;
      if (b.life > b.maxLife - fadeLen) alpha *= (b.maxLife - b.life) / fadeLen;

      ctx.font = `${b.size}px 'Space Mono', monospace`;
      ctx.fillStyle = `rgba(10,22,40,${alpha})`;
      ctx.fillText(b.char, b.x, b.y);

      if (b.life >= b.maxLife || b.y < -20) {
        // recycle
        Object.assign(b, randomBit());
        b.y = canvas.height + 10;
      }
    }

    requestAnimationFrame(draw);
  }
  localStorage.setItem("jobhubUser", JSON.stringify({
  name: fullNameInputValue,   // e.g. "Himanshi Srivastava"
  email: emailInputValue
}));
window.location.href = "index.html";
  draw();
</script>
</body>
</html>
